kind = "web"
previewPath = "/"
title = "AI Arena"
version = "1.0.0"
id = "artifacts/ai-arena"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25941

[services.development]
run = "pnpm --filter @workspace/ai-arena run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-arena", "run", "build" ]
publicDir = "artifacts/ai-arena/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25941"
BASE_PATH = "/"
